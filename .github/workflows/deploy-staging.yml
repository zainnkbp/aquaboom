name: Deploy to Staging Server

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Executing Remote SSH Commands for Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            cd ${{ secrets.STAGING_PATH }}
            
            # 1. Paksa sinkronisasi kode terbaru dari branch staging (Mencegah konflik git)
            git fetch origin staging
            git reset --hard origin/staging
            
            # 2. Update dependensi PHP (Composer)
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # 3. Build asset Frontend (Vite / Tailwind / Alpine.js)
            npm install
            npm run build
            
            # 4. Clear dan Refresh Cache Laravel
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache